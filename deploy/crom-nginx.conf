# ==========================================
# CROM Engine - Nginx Configuration
# Coloque este arquivo em: /etc/nginx/sites-available/crom
# Depois crie o link: ln -s /etc/nginx/sites-available/crom /etc/nginx/sites-enabled/
# ==========================================

# 1. BLOCO DE REDIRECIONAMENTO (Subdomínios secundários -> p.crom.run)
server {
    listen 80;
    server_name search.crom.run pesquisador.crom.run s.crom.run;

    # SEO Redirect 301 (Permanente)
    return 301 https://p.crom.run$request_uri;
}

# 2. BLOCO DE REDIRECIONAMENTO DE PATHS (crom.run/p e crom.run/pesquisador)
# Descomente e adicione isso no bloco server do seu domínio "crom.run" principal (se existir):
# server {
#     server_name crom.run;
#     location /p { return 301 https://p.crom.run/; }
#     location /pesquisador { return 301 https://p.crom.run/; }
# }

# 3. BLOCO PRINCIPAL (p.crom.run)
server {
    listen 80;
    server_name p.crom.run;

    # Otimização: Servir o React diretamente (Build de Produção)
    # Certifique-se que o caminho confere com onde você fez o git clone
    root /var/www/crom-pesquisador/frontend/dist;
    index index.html;

    # Compression (Gzip) para maior velocidade
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Frontend React (SPA Routing Handler)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Reverso para a API Go (Backend)
    location /api/ {
        proxy_pass http://localhost:8098;
        
        # Headers necessários para repassar IP real para o Rate Limiting do Go
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
